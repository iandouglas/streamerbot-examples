<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: transparent;
    }
  </style>
  <script src="assets/js/streamerbot-client.js"></script>
  <script src="battleship.js" defer></script>
</head>
<body>
  <div id="game-container">
    <canvas id="waterCanvas" width="1920" height="1080"></canvas>
    <canvas id="shipCanvas" width="1920" height="1080"></canvas>
    <canvas id="fogCanvas" width="1920" height="1080"></canvas>
    <canvas id="hudCanvas" width="1920" height="1080"></canvas>
    <div id="joinCountdown"></div>

    <div id="leaderboard">
      <div class="heading">Top 10 Players</div>
    </div>
    <div id="rightPanel">
      <div id="shipRoster"></div>
      <div id="mineRoster"></div>
      <div id="roundInfo">
        <div id="modeLabel"></div>
        <div id="joinHint">Type !join to play</div>
        <div id="roundNumber"></div>
        <div id="countdown"></div>
      </div>
    </div>

    <div id="debugOverlay"></div>
    <div id="status">Connecting to Streamer.bot...</div>
  </div>
</body>
</html>
