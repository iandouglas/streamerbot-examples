<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #gameCanvas {
      background-color: #00ff00; /* Greenscreen background */
      display: block;
    }

    #debugOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80%;
      overflow-y: auto;
      color: #ffffff;
      font-family: monospace;
      font-size: 16px;
      line-height: 1.25;
      padding: 10px;
      box-sizing: border-box;
      white-space: pre-wrap;
      z-index: 9999;
      pointer-events: none;
      text-shadow: none;
    }
  </style>
  <script src="assets/js/streamerbot-client.js"></script>
  <script src="cannon.js" defer></script>
</head>
<body>
  <canvas id="gameCanvas" width="1920" height="1080"></canvas>
  <div id="debugOverlay">Waiting for events...</div>
</body>
</html>
