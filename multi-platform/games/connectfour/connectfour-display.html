<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer.bot Connect Four</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(90deg, #ff5e57 0%, #f06595 50%, #ff9966 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-label {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1.1em;
            font-weight: bold;
        }

        .grid-container {
            display: inline-block;
            background: #0a0a12;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .grid {
            display: grid;
            gap: 8px;
        }

        .grid.easy, .grid.normal {
            grid-template-columns: repeat(7, 60px);
            grid-template-rows: repeat(6, 60px);
        }

        .grid.extreme {
            grid-template-columns: repeat(11, 45px);
            grid-template-rows: repeat(6, 45px);
        }

        .cell {
            width: 60px;
            height: 60px;
            background: #1e3c72;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .grid.extreme .cell {
            width: 45px;
            height: 45px;
        }

        .cell.player1 {
            background: radial-gradient(circle at 30% 30%, #ff5e57 0%, #ff3b30 100%);
            box-shadow: 0 0 15px rgba(255, 94, 87, 0.6);
        }

        .cell.player2 {
            background: radial-gradient(circle at 30% 30%, #f9d423 0%, #ff9966 100%);
            box-shadow: 0 0 15px rgba(249, 212, 35, 0.6);
        }

        .cell.winning {
            animation: pulse 1s infinite;
            border: 3px solid white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes drop {
            0% { transform: translateY(-300px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .cell.dropping {
            animation: drop 0.5s ease-out;
        }

        .voting-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .voting-timer {
            font-size: 1.5em;
            color: #ffd700;
            font-weight: bold;
        }

        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .winner-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .winner-title {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .winner-player1 {
            color: #ff5e57;
            text-shadow: 0 0 20px rgba(255, 94, 87, 0.5);
        }

        .winner-player2 {
            color: #f9d423;
            text-shadow: 0 0 20px rgba(249, 212, 35, 0.5);
        }

        .winner-tie {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .difficulty-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #0a0a12;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .difficulty-easy {
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .difficulty-normal {
            color: #ffd700;
            border: 2px solid #ffd700;
        }

        .difficulty-extreme {
            color: #ff5e57;
            border: 2px solid #ff5e57;
        }

        .player-list {
            margin-top: 15px;
            font-size: 0.9em;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Connect Four</h1>
        
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">Current Turn</span>
                <span class="status-value" id="currentTurn">Player 1</span>
            </div>
            <div class="status-item">
                <span class="status-label">Turn Count</span>
                <span class="status-value" id="turnCount">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">Difficulty</span>
                <span class="status-value difficulty-badge difficulty-easy" id="difficultyDisplay">Easy</span>
            </div>
        </div>

        <div class="grid-container">
            <div class="grid easy" id="grid"></div>
        </div>

        <div class="voting-info" id="votingSection">
            <span class="status-label">Vote for column (1-7): <span class="voting-timer" id="timerDisplay">00:30</span></span>
        </div>

        <div class="player-list" id="playerList">
            Players: None
        </div>
    </div>

    <div class="winner-overlay" id="winnerOverlay">
        <h1 class="winner-title" id="winnerTitle">Player 1 Wins!</h1>
        <p id="winnerMessage" style="color: white; font-size: 1.5em;">Congratulations!</p>
    </div>

    <script>
        let gameState = {
            grid: [],
            currentPlayer: 1,
            difficulty: 'easy',
            players: [],
            phase: 'WAITING_FOR_VOTES'
        };

        const socket = new WebSocket('ws://localhost:3000');
        let timerInterval = null;
        let timerValue = 30;

        function initGrid(difficulty) {
            const gridEl = document.getElementById('grid');
            const rows = 6;
            const cols = difficulty === 'extreme' ? 11 : 7;
            
            gridEl.className = `grid ${difficulty}`;
            gridEl.innerHTML = '';

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    gridEl.appendChild(cell);
                }
            }

            return { rows, cols };
        }

        function updateGrid(gridData) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                const value = gridData[row][col];
                
                cell.className = 'cell';
                if (value === 1) {
                    cell.classList.add('player1');
                } else if (value === 2) {
                    cell.classList.add('player2');
                }
            });
        }

        function updatePlayers(players) {
            if (players.length === 0) {
                document.getElementById('playerList').innerHTML = 'Players: None';
                return;
            }

            const playerNames = players.map(p => {
                if (p.playerId === 1) return `${p.name} (Player 1 - Red)`;
                if (p.playerId === 2) return `${p.name} (Player 2 - Yellow)`;
                return p.name;
            }).join(', ');

            document.getElementById('playerList').innerHTML = `Players: ${playerNames}`;
        }

        function updateTurnInfo(currentPlayer, turnCount) {
            const player1Name = gameState.players.find(p => p.playerId === 1)?.name || 'Player 1';
            const player2Name = gameState.players.find(p => p.playerId === 2)?.name || 'Player 2';
            
            const turnText = currentPlayer === 1 
                ? `<span style="color: #ff5e57">${player1Name}</span> (Red)` 
                : `<span style="color: #f9d423">${player2Name}</span> (Yellow)`;
            
            document.getElementById('currentTurn').innerHTML = turnText;
            document.getElementById('turnCount').textContent = turnCount;
        }

        function updateDifficulty(difficulty) {
            const el = document.getElementById('difficultyDisplay');
            el.textContent = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
            el.className = `difficulty-badge difficulty-${difficulty}`;
        }

        function startTimer(seconds) {
            if (timerInterval) clearInterval(timerInterval);
            timerValue = seconds;
            
            timerInterval = setInterval(() => {
                timerValue--;
                document.getElementById('timerDisplay').textContent = `00:${String(timerValue).padStart(2, '0')}`;
                
                if (timerValue <= 0) {
                    clearInterval(timerInterval);
                    if (gameState.phase === 'WAITING_FOR_VOTES') {
                        socket.send(JSON.stringify({ type: 'timerExpired' }));
                    }
                }
            }, 1000);
        }

        function showWinner(winner, winningCells) {
            const overlay = document.getElementById('winnerOverlay');
            const title = document.getElementById('winnerTitle');
            
            if (winner === 'draw') {
                title.textContent = "It's a Draw!";
                title.className = 'winner-title winner-tie';
            } else {
                const playerName = winner === 1 
                    ? gameState.players.find(p => p.playerId === 1)?.name || 'Player 1' 
                    : gameState.players.find(p => p.playerId === 2)?.name || 'Player 2';
                title.textContent = `${playerName} Wins!`;
                title.className = winner === 1 
                    ? 'winner-title winner-player1' 
                    : 'winner-title winner-player2';
                
                const cells = document.querySelectorAll('.cell');
                winningCells.forEach(pos => {
                    const index = pos.row * (gameState.difficulty === 'extreme' ? 11 : 7) + pos.col;
                    cells[index].classList.add('winning');
                });
            }
            
            setTimeout(() => {
                overlay.classList.add('active');
            }, 500);
        }

        function resetGame() {
            document.getElementById('winnerOverlay').classList.remove('active');
            document.getElementById('playerList').innerHTML = 'Players: None';
            document.getElementById('votingSection').style.display = 'block';
            
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.className = 'cell');
        }

        socket.addEventListener('message', (event) => {
            const data = JSON.parse(event.data);
            
            switch (data.type) {
                case 'gameState':
                    gameState = data;
                    const { rows, cols } = initGrid(data.difficulty);
                    
                    if (data.grid && data.grid.length > 0) {
                        updateGrid(data.grid);
                    } else {
                        const emptyGrid = Array(rows).fill(null).map(() => Array(cols).fill(0));
                        updateGrid(emptyGrid);
                    }
                    
                    updatePlayers(data.players || []);
                    updateTurnInfo(data.currentPlayer, data.turnCount);
                    updateDifficulty(data.difficulty);
                    
                    if (data.timerSeconds) {
                        startTimer(data.timerSeconds);
                    }
                    break;

                case 'timerExpired':
                    if (timerInterval) clearInterval(timerInterval);
                    break;

                case 'gameOver':
                    showWinner(data.winner, data.winningCells);
                    setTimeout(resetGame, 5000);
                    break;

                case 'votingInfo':
                    if (data.timerSeconds) {
                        startTimer(data.timerSeconds);
                    }
                    break;
            }
        });

        socket.addEventListener('open', () => {
            console.log('Connected to WebSocket');
        });

        socket.addEventListener('error', (error) => {
            console.error('WebSocket error:', error);
        });

        window.addEventListener('load', () => {
            initGrid('easy');
        });
    </script>
</body>
</html>
